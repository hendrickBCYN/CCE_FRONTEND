server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA : fallback vers index.html pour react-router-dom 
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API vers le backend Express 
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Unity WebGL : MIME types + encodage gzip 
    location /unity-build/Build/ {
        # Fichiers compressés par Unity (.unityweb)
        types {
            application/javascript      loader.js;
            application/octet-stream    data.unityweb;
            application/wasm            wasm.unityweb;
            application/javascript      framework.js.unityweb;
        }

        # Indiquer au navigateur que les .unityweb sont déjà gzippés
        add_header Content-Encoding gzip;
    }
}
